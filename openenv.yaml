name: "Sentinel-Log-Shield"
title: "Sentinel-Log-Shield: Interactive Security Investigation Environment"
description: >
  A genuine multi-step RL environment where agents investigate simulated data
  breaches through procedurally-generated entity graphs. Agents SCAN logs,
  INVESTIGATE entities to reveal hidden connections, REDACT discovered PII,
  and SUBMIT findings — all within a limited step budget.

version: "2.0.0"
license: "MIT"

# Environment specification
environment:
  framework: "openenv"
  base_class: "SentinelEnvironment"
  module: "env"
  methods:
    - name: "reset"
      description: "Start a new investigation episode with procedurally-generated scenario"
      input:
        difficulty: "easy | medium | hard"
        seed: "Optional integer for reproducibility"
      output: "ResetResult(observation, info)"
    - name: "step"
      description: "Execute one investigation action"
      input: "AgentAction(action_type, target_entity?, redactions?)"
      output: "StepResult(observation, reward, terminated, truncated, info)"
    - name: "state"
      description: "Get current environment state"
      input: null
      output: "EnvironmentState"

# Action space
action_space:
  type: "discrete"
  actions:
    - name: "SCAN"
      description: "Extract PII entities from currently visible logs"
      parameters: null
    - name: "INVESTIGATE"
      description: "Deep-dive into an entity; reveals connected logs and hidden PII"
      parameters:
        target_entity: "string — entity to investigate (username, IP, email)"
    - name: "REDACT"
      description: "Submit discovered PII items for redaction scoring"
      parameters:
        redactions: "list of {original: string, type: string}"
    - name: "SUBMIT"
      description: "End the episode and receive final comprehensive score"
      parameters: null

# Observation space
observation_space:
  visible_logs: "List[str] — log entries currently visible"
  discovered_entities: "List[str] — PII entities found so far"
  investigation_targets: "List[str] — entities available for investigation"
  scan_results: "List[Dict] — PII found in latest scan"
  redacted_items: "List[Dict] — PII already redacted"
  steps_remaining: "int — investigation budget left"
  steps_used: "int — steps consumed"
  difficulty: "str — easy | medium | hard"
  hint: "str — environment guidance"
  score_so_far: "float — running score"
  total_pii_to_find: "int — total hidden PII items"
  pii_found_count: "int — items correctly redacted"

# Difficulty configuration
difficulty_levels:
  easy:
    users: 3
    layers: 2
    step_budget: 8
    secrets: 1
    description: "Three users, shallow investigation, tight budget"
  medium:
    users: 4
    layers: 3
    step_budget: 7
    secrets: 2
    description: "Four users, moderate depth, tighter budget"
  hard:
    users: 5
    layers: 4
    step_budget: 6
    secrets: 3
    description: "Five users, deep investigation, strict budget + traps"

# Reward specification
reward:
  components:
    f1_score:
      weight: 0.70
      description: "Precision/Recall/F1 of redacted vs ground truth"
    discovery_rate:
      weight: 0.20
      description: "Fraction of total PII the agent discovered"
    recall_bonus:
      weight: 0.10
      description: "Raw recall (items redacted / total)"
    efficiency_bonus:
      per_step_saved: 0.05
      description: "Bonus for completing with steps remaining"
    secret_penalty:
      per_missed: -0.30
      description: "Harsh penalty for each critical secret missed"

# RL properties
rl_properties:
  state_transitions: true
  sequential_decisions: true
  hidden_information: true
  procedural_generation: true
  strategy_required: true
  exploration_vs_exploitation: true

# API specification (FastAPI)
api:
  framework: "fastapi"
  host: "0.0.0.0"
  port: 7860
  endpoints:
    - method: "POST"
      path: "/reset"
      description: "Start new investigation episode"
      response_model: "ResetResult"
    - method: "POST"
      path: "/step"
      description: "Execute investigation action"
      input_model: "AgentAction"
      response_model: "StepResult"
    - method: "GET"
      path: "/state"
      description: "Get current state"
      response_model: "EnvironmentState"
    - method: "GET"
      path: "/health"
      description: "Health check"

# Docker configuration
docker:
  image: "sentinel-log-shield:2.0"
  port: 7860
  environment:
    - "HOST=0.0.0.0"
    - "PORT=7860"

# Production readiness
production:
  modular_design: true
  pydantic_models: true
  error_handling: true
  logging: true
  cors_enabled: true
  health_check: true
  procedural_generation: true
  gymnasium_compliant: true
